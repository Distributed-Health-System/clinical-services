# Workflow for Notification Service
name: Build and Push Docker Image (Notification Service)

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'notification-service/**'

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "SHORT_SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> $GITHUB_ENV
          else
            echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          file: ./notification-service/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.SHORT_SHA }}
        env:
          DOCKER_BUILDKIT: 1
