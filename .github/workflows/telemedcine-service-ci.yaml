# Workflow for Telemedicine Service
name: Build and Push Docker Image (Telemedicine Service)

on:
  push:
    branches:
      - main
    paths:
      - 'telemedicine-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemedicine-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./telemedicine-service
          file: ./telemedicine-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/telemedicine-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/telemedicine-service:${{ env.SHORT_SHA }}
